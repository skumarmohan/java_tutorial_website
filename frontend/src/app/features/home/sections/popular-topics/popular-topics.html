<section class="section">
  <div class="section__header">
    <p class="section__eyebrow">Popular Topics</p>
    <h2>Jump Into a Topic</h2>
    <p class="section__subtitle">The most-read lessons on the platform, hand-picked to get you moving fast.</p>
  </div>

  <div class="section__grid">
    @for (topic of topics; track topic.slug) {
      <app-topic-card [topic]="topic" />
    }
  </div>
</section>
